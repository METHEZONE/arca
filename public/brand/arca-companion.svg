<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 210" width="220" height="210">
  <defs>
    <linearGradient id="acBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a1812"/>
      <stop offset="1" stop-color="#150c07"/>
    </linearGradient>
    <radialGradient id="acEye" cx="0.5" cy="0.38" r="0.78">
      <stop offset="0" stop-color="#ffe7cc"/>
      <stop offset="0.5" stop-color="#ff9a3c"/>
      <stop offset="1" stop-color="#ff7a1a"/>
    </radialGradient>
    <radialGradient id="acHalo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff7a1a" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#ff7a1a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ambient glow -->
  <ellipse cx="110" cy="116" rx="104" ry="94" fill="url(#acHalo)"/>

  <!-- antenna -->
  <line x1="110" y1="42" x2="110" y2="24" stroke="#ff7a1a" stroke-width="4" stroke-linecap="round"/>
  <circle cx="110" cy="18" r="6.5" fill="#ff7a1a">
    <animate attributeName="opacity" values="1;0.45;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- head -->
  <rect x="36" y="46" width="148" height="138" rx="44" fill="url(#acBody)" stroke="#7a4a2a" stroke-width="2.5"/>

  <!-- eyes (blink) -->
  <ellipse cx="85" cy="116" rx="12" ry="23" fill="url(#acEye)">
    <animate attributeName="ry" values="23;23;23;2;23;23" keyTimes="0;0.85;0.9;0.93;0.96;1" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="135" cy="116" rx="12" ry="23" fill="url(#acEye)">
    <animate attributeName="ry" values="23;23;23;2;23;23" keyTimes="0;0.85;0.9;0.93;0.96;1" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  <circle cx="81" cy="106" r="3.4" fill="#fff" opacity="0.85"/>
  <circle cx="131" cy="106" r="3.4" fill="#fff" opacity="0.85"/>
</svg>
